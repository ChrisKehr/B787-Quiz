<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1742b5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="B787 Quiz">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>B787 Type Rating Quiz</title>
<style>
:root {
  --blue:#1742b5;
  --blue2:#2f7dff;
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#172033;
  --muted:#64748b;
  --good:#0f8a43;
  --bad:#b42318;
  --shadow:0 18px 45px rgba(15,23,42,.12);
}
* { box-sizing:border-box; }
html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
body { padding: max(18px, env(safe-area-inset-top)) 14px max(22px, env(safe-area-inset-bottom)); }
.app { width:min(860px,100%); margin:0 auto; }
.card { background:var(--card); border-radius:26px; box-shadow:var(--shadow); padding:clamp(18px,4vw,32px); border:1px solid rgba(148,163,184,.25); }
.header { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; }
.brand { display:flex; align-items:center; gap:12px; min-width:0; }
.logo { width:46px; height:46px; border-radius:16px; background:linear-gradient(145deg,#2f7dff,#123a91); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900; box-shadow:inset 0 2px 8px rgba(255,255,255,.3), 0 10px 22px rgba(23,66,181,.25); }
h1,h2,h3,p { margin-top:0; }
h1 { font-size:clamp(1.45rem,4vw,2.15rem); margin-bottom:6px; }
.subtitle { color:var(--muted); margin:0; line-height:1.4; }
.menuGrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-top:22px; }
.menuBtn, .controlBtn {
  border:0; border-radius:20px; padding:18px; cursor:pointer; background:linear-gradient(180deg,#fff,#eef5ff); color:var(--text);
  text-align:left; box-shadow:0 10px 24px rgba(15,23,42,.08); border:1px solid rgba(23,66,181,.14);
  transition:transform .15s ease, box-shadow .15s ease;
}
.menuBtn:hover, .controlBtn:hover { transform:translateY(-1px); box-shadow:0 14px 28px rgba(15,23,42,.12); }
.menuBtn strong { display:block; color:var(--blue); font-size:1.2rem; margin-bottom:6px; }
.menuBtn span { color:var(--muted); }
.smallBtn { border:1px solid rgba(23,66,181,.18); background:#fff; color:var(--blue); border-radius:999px; padding:10px 14px; font-weight:700; cursor:pointer; }
.smallBtn:disabled { opacity:.5; cursor:not-allowed; }
.quizTop { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:14px; }
.progressWrap {
  height:22px;
  border-radius:999px;
  overflow:hidden;
  background:linear-gradient(180deg,#c8d2e2 0%,#eef3fa 45%,#ffffff 100%);
  box-shadow:
    inset 0 3px 6px rgba(15,23,42,.22),
    inset 0 -2px 4px rgba(255,255,255,.85),
    0 4px 10px rgba(15,23,42,.08);
  border:1px solid rgba(80,100,130,.22);
  margin:16px 0 22px;
}
.progressBar {
  height:100%;
  width:0%;
  border-radius:999px;
  background:
    linear-gradient(180deg,
      #a9d8ff 0%,
      #55aaff 20%,
      #1674e8 52%,
      #0b4db6 100%);
  box-shadow:
    inset 0 3px 5px rgba(255,255,255,.65),
    inset 0 -4px 7px rgba(0,0,0,.26),
    2px 0 7px rgba(23,66,181,.25);
  transition:width .35s ease;
}
.questionText {
  font-size:clamp(1.12rem,3.2vw,1.48rem);
  line-height:1.42;
  white-space:pre-wrap;
  margin-bottom:18px;
  font-weight:750;
}
.answers { display:grid; gap:12px; }
.answer { width:100%; border:1px solid rgba(148,163,184,.32); background:linear-gradient(180deg,#fff,#f8fafc); border-radius:18px; padding:14px 15px; display:flex; align-items:flex-start; gap:12px; text-align:left; cursor:pointer; font-size:1rem; line-height:1.35; color:var(--text); box-shadow:0 8px 18px rgba(15,23,42,.06); }
.answer:hover { border-color:rgba(23,66,181,.35); }
.answer[disabled] { cursor:default; opacity:.88; }
.answer.correct { border-color:rgba(15,138,67,.65); background:linear-gradient(180deg,#f0fdf4 0%,#dcfce7 100%); box-shadow:0 0 0 2px rgba(15,138,67,.08); }
.answer.correct .letter { background:var(--good); color:#fff; }
.answer.wrong { border-color:rgba(180,35,24,.65); background:linear-gradient(180deg,#fff5f5 0%,#fee2e2 100%); box-shadow:0 0 0 2px rgba(180,35,24,.08); }
.answer.wrong .letter { background:var(--bad); color:#fff; }
.letter { flex:0 0 auto; width:30px; height:30px; border-radius:999px; background:#edf2ff; color:#1742b5; display:inline-flex; align-items:center; justify-content:center; font-weight:800; }
.feedback { min-height:28px; margin:14px 0 0; font-weight:800; }
.feedback.good { color:var(--good); }
.feedback.bad { color:var(--bad); }
.stats { display:flex; gap:16px; flex-wrap:wrap; border-top:1px solid rgba(148,163,184,.24); margin-top:18px; padding-top:16px; color:var(--muted); }
.stats strong { color:var(--text); }
.quote.good { color:var(--good); }
.quote.bad { color:var(--bad); }
.endActions { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-top:22px; }
.resultBox { border-radius:22px; padding:18px; margin-top:14px; line-height:1.5; }
.resultBox.good { background:#ecfdf3; border:1px solid rgba(15,138,67,.2); }
.resultBox.bad { background:#fff1f2; border:1px solid rgba(180,35,24,.2); }
.installHint { margin-top:18px; background:#eef5ff; border:1px solid rgba(23,66,181,.16); border-radius:20px; padding:14px; color:#123a91; line-height:1.45; }
.hidden { display:none !important; }
@media (max-width:680px) {
  .menuGrid, .endActions { grid-template-columns:1fr; }
  .card { border-radius:22px; }
  .quizTop { flex-direction:column; }
  .answer { padding:13px; }
}
</style>
</head>
<body>
<div class="app">
  <section id="menu" class="card">
    <div class="header">
      <div class="brand">
        <div class="logo">787</div>
        <div>
          <h1>B787 Type Rating Quiz</h1>
          <p class="subtitle">Vier Tests, offline nutzbar, mit 75%-Auswertung nur für korrekte Erstversuche.</p>
        </div>
      </div>
    </div>
    <div class="menuGrid">
      <button class="menuBtn" onclick="startTest(1,false)"><strong>Test 1</strong><span>Original-Reihenfolge starten</span></button>
      <button class="menuBtn" onclick="startTest(2,false)"><strong>Test 2</strong><span>Original-Reihenfolge starten</span></button>
      <button class="menuBtn" onclick="startTest(3,false)"><strong>Test 3</strong><span>Original-Reihenfolge starten</span></button>
      <button class="menuBtn" onclick="startTest(4,false)"><strong>Test 4</strong><span>Original-Reihenfolge starten</span></button>
    </div>
    <div class="installHint">
      <strong>Installation:</strong> Im Handy-Browser öffnen und dann „Zum Home-Bildschirm hinzufügen“ bzw. „App installieren“ wählen.
    </div>
  </section>

  <section id="quiz" class="card hidden">
    <div class="quizTop">
      <div>
        <h2 id="quizTitle">Frage</h2>
        <p id="quizSub" class="subtitle"></p>
      </div>
      <button class="smallBtn" onclick="confirmBackToMenu()">Hauptmenü</button>
    </div>
    <div class="progressWrap"><div id="progressBar" class="progressBar"></div></div>
    <div id="questionText" class="questionText"></div>
    <div id="answers" class="answers"></div>
    <div id="feedback" class="feedback"></div>
    <div class="stats">
      <div>Erstversuch richtig: <strong id="scoreText">0 / 0</strong></div>
      <div>Quote: <strong id="quoteText" class="quote bad">0,0 %</strong></div>
    </div>
  </section>

  <section id="end" class="card hidden">
    <h2 id="endTitle"></h2>
    <div id="endText" class="resultBox"></div>
    <div class="endActions">
      <button id="restartOriginal" class="controlBtn"><strong>Neu starten</strong><br>Original-Reihenfolge</button>
      <button id="restartMixed" class="controlBtn"><strong>Neu starten</strong><br>Gemischt</button>
      <button class="controlBtn" onclick="showMenu()"><strong>Hauptmenü</strong><br>Testauswahl öffnen</button>
    </div>
  </section>
</div>

<script>
const TESTS = {"1": [{"num": 1, "question": "What does the AUX Display show and where is it located?", "A": "There is no AUX Display", "B": "On the inside side of the respective PFD. It contains information about, maintenance status, communication and communication", "C": "On the outside side of the respective PFD. It contains information about Time, flight and communication data.", "D": "On the upper corner of the lower DU. It is switched off for Lufthansa operation.", "correct": "C"}, {"num": 2, "question": "What is the temperature range of the flight deck ?", "A": "18 to 29 C", "B": "15 to 28 C", "C": "12 to 30 C", "D": "16 to 29 C", "correct": "A"}, {"num": 3, "question": "What happens when the DES DIR> prompt is selected on the FMC DESCENT page?", "A": "The DESCENT DIRECTORY page is shown.", "B": "The airplane immediately starts a descent along the VNAV path.", "C": "All descent constraints are immediately removed.", "D": "All constraints between the current altitude and the MCP selected altitude are removed (just like CLB DIR).", "correct": "D"}, {"num": 4, "question": "Which FMC calculated altitude is the most economic for the next 250-500NM, based on weight, cruise speed schedule and forecasted wind and temperatures at cruise altitudes?", "A": "MAX", "B": "RECMD", "C": "CRZ ALT", "D": "OPT", "correct": "B"}, {"num": 5, "question": "How is a frequency transferred from the STBY to the ACTIVE side on the TCP?", "A": "There is no STBY side on the TCP.", "B": "The frequency automatically transfers after a time delay of 5 seconds.", "C": "By using the XFR switch.", "D": "It has to be manually entered into the scratchpad and then selected to the ACTIVE position.", "correct": "C"}, {"num": 6, "question": "What is the maximum fuel temperature for T/O ?", "A": "45 Celsius", "B": "51 Celsius", "C": "49 Celsius", "D": "47 Celsius", "correct": "C"}, {"num": 7, "question": "To prevent tailtipping hazard, do not release brakes with N1 greater than", "A": "55% N1", "B": "35% N1", "C": "70% N1", "D": "40% N1", "correct": "A"}, {"num": 8, "question": "Does the FMC account for Anti-Ice operation when calculating a VNAV descent path?", "A": "Yes, automatically as long as the EAI/WAI switches are in AUTO.", "B": "No, the pilots have to adjust for Anti-Ice operation in their descent planning.", "C": "Yes, but only if a TAI/ON altitude has been entered on the DESCENT FORECAST page.", "D": "Yes, automatically for all FLs/altitudes where a temperature below 10°C is forecast.", "correct": "C"}, {"num": 9, "question": "GPWS System OVRD via the TCP. Which statement is correct ?", "A": "All TCP overrides reset with APU shutdown and Battery OFF", "B": "TCP overrides have to be reset manually before the next flight", "C": "All TCP overrides reset 10 Minutes after the first cabin door is open", "D": "All TCP overrides reset after engine shutdown", "correct": "C"}, {"num": 10, "question": "How many flight control surfaces has the B787 for roll control", "A": "4 Ailerons - 14 Spoilers", "B": "4 Ailerons - 2 Flaperons - 12 Spoilers", "C": "1 Rudder - 4 Ailerons - 12 Spoilers", "D": "2 Ailerons - 2 Flaperons - 14 Spoilers", "correct": "D"}, {"num": 11, "question": "What is the main advantage of the IAN function?", "A": "Raw data does not have to be monitored during a VOR approach.", "B": "Autoland is possible for all IAN approaches.", "C": "Different types of approaches can be flown using the same procedure.", "D": "The airplane automatically levels off at minimums during a non-precision approach.", "correct": "C"}, {"num": 12, "question": "Which are possible source indications for engine vibration ?", "A": "Only N1 and N2", "B": "Only N2", "C": "N1, N2 and BB", "D": "Only N1", "correct": "C"}, {"num": 13, "question": "When, during engine start, the engine has reached idle N2, …", "A": "...the EGT start limit is removed.", "B": "...RUNNING appears above the indication for 30 seconds.", "C": "all answers correct.", "D": "...the idle target indication is removed.", "correct": "C"}, {"num": 14, "question": "The N1 Limit for reverse thrust is…..", "A": "70% N1", "B": "60% N1", "C": "65% N1", "D": "calculated by EEC", "correct": "D"}, {"num": 15, "question": "Which fuel pumps are used for fuel jettison?", "A": "Left and right main tank pumps only", "B": "Fuel jettison can only be accomplished with one engine inoperative", "C": "Only center tank pumps", "D": "Left and right main tank pumps and the center tank jettison/override pumps", "correct": "D"}, {"num": 16, "question": "\"A status message intended for maintanance that did not display on EICAS said R ENG OIL FILTER CLOG AND BYPASS. We looked up for the appropriate checklist and completed all items including shut down of R ENG. We declared emergency and diverted to the nearest suitable airport (Boston). The copilot and I decided what to do together\" - The actions the pilots took, where not apropriate because: (Select the best answer)", "A": "The pilots should have taken action from memory", "B": "The pilots should have shut down the left engine", "C": "A status display for dispatch so there was no need to shut down the engine and declare emergency", "D": "In emergency the pilot should have made the decision and not decide with the copilot.", "correct": "C"}, {"num": 17, "question": "Can you manually force the flight control system into Secondary Mode?", "A": "Yes, by switching off the Normal Mode", "B": "Yes, by placing the PFC disconnect switch to DISC", "C": "Yes, by selecting Secondary Mode on the CDU page", "D": "No", "correct": "D"}, {"num": 18, "question": "Without LAND 2 or LAND 3 annunciated, the autopilot must be disengaged below", "A": "360ft AGL", "B": "135ft AGL", "C": "200ft AGL", "D": "100ft AGL", "correct": "B"}, {"num": 19, "question": "What is the function of the Battery Lights on the Towing Power Panel?", "A": "They illuminate if the battery needs to be replaced", "B": "They inform you about the remaining time for towing operation", "C": "They illuminate if the aircraft runs on battery power only", "D": "They permanently show the battery loading state", "correct": "B"}, {"num": 20, "question": "When can engine anti-ice be operated manually?", "A": "Only on the ground", "B": "Only if TAT is above 10°C", "C": "Only in the air", "D": "On the ground or in the air", "correct": "D"}, {"num": 21, "question": "In the normal flight control system mode, rudder movement is calculated from the airspeed.", "A": "At high airspeeds, the rudder can move full travel left to right.", "B": "At low airspeeds, the rudder can move full travel left to right.", "C": "As airspeed decreases, the rudder movement is gradually decreased", "D": "At clean speed and above, rudder movement is the greatest.", "correct": "B"}, {"num": 22, "question": "Cabine altitude is controlled by", "A": "adjustments of the amount of air that is extracted from engine bleed air.", "B": "adjustments of the amount of cabin air that is released from the airplane.", "C": "the four electric cabin air compressors (CAC)", "D": "the two packs", "correct": "B"}, {"num": 23, "question": "What determines the pack outlet temperature?", "A": "The zone requesting the highest temperature", "B": "The master cabin temperature control", "C": "The zone requesting the coldest temperature", "D": "The average demand of all zones", "correct": "C"}, {"num": 24, "question": "The cabin pressure control system (CPCS) gets information for calcution of the pressurization schedule", "A": "internal environmental sensors (IES)", "B": "from entrys on the respective system page", "C": "from the FMC in auto mode", "D": "via internal data link", "correct": "C"}, {"num": 25, "question": "FMS Preflight sequence is led by line select key 6R. What page will not be accessed by following LSK 6R but is vitally important for preflight?", "A": "THRUST LIM", "B": "PERF INIT", "C": "NAV RAD", "D": "TAKEOFF", "correct": "C"}, {"num": 26, "question": "How are the parking brake actuators kept in position?", "A": "Locked pedal force keeps park brake in place", "B": "Main Battery power keeps electric actuators in position up to 18hrs", "C": "Park Brake Isolation Valve maintains hydraulic pressure to the brakes", "D": "The parking brake electric actuators are clamped in position during parking brake application and require no active power to maintain the clamping force.", "correct": "D"}, {"num": 27, "question": "Boeing’s automation is:", "A": "Not to be overridden", "B": "A tool to assist and override pilot authority", "C": "Failsafe", "D": "A tool to assist and not to override pilot authority", "correct": "D"}, {"num": 28, "question": "If all electrical power is available, what causes the EMER LIGHT EICAS advisory message to be displayed?", "A": "The EMER LIGHT switch on the overhead panel is not armed or the EMER LIGHTs are on", "B": "The APU generators are switched off", "C": "The EMER LIGHT switch on the overhead panel is armed", "D": "The emergency lighting system has failed", "correct": "A"}, {"num": 29, "question": "What happens when an APU fire is detected on ground and the engines are not running?", "A": "The APU shuts down automatically but both APU extinguisher bottles must be discharged manually", "B": "The APU does not shut down automatically but the APU extinguisher bottle discharges automatically", "C": "The APU does not shut down automatically and the APU extinguisher bottle must be discharged manually", "D": "The APU shuts down automatically and the APU extinguisher bottle discharges automatically", "correct": "D"}, {"num": 30, "question": "How is fuel supplied to the APU?", "A": "By a DC pump in the right main fuel tank.", "B": "From the left main tank; by a DC pump if main airplane power is not available or an AC pump if main airplane power is available.", "C": "By two AC pumps in the center tank", "D": "By gravity feeding from the vertical stabilizer tank (VST).", "correct": "B"}, {"num": 31, "question": "Flap Loads Relief in primary mode", "A": "is avalable for landing flaps settings only", "B": "is available for flap setting 15 and on", "C": "is available for all flaps settings", "D": "is available for all flaps settings", "correct": "B"}, {"num": 32, "question": "Which statetment about the pack inlet anti-ice system is true?", "A": "The system has to be switched on during preflight.", "B": "The system uses hot trim air.", "C": "The system operates on ground and in flight.", "D": "There are no flight deck controls or indications for normal operation.", "correct": "D"}, {"num": 33, "question": "Where are hydraulic system quantities displayed?", "A": "On status display only", "B": "On hydraulic synoptic page only", "C": "Either on the status display or the hydraulic synoptic", "D": "Secondary engine display", "correct": "C"}, {"num": 34, "question": "Which statement is true?", "A": "A turn away from an obstacle within 16.8m from the nose or 4.6m from the wing tip, might not be successfull.", "B": "During a turn the tail swings the largest arc", "C": "A runway witdth of 45m is sufficient for the B787-9 for a normal 180° turn", "D": "Maximum steering angle is 71.3°", "correct": "A"}, {"num": 35, "question": "What does the amber REV on EICAS indicate ?", "A": "The thrust reverser is in transit", "B": "The thrust reverser is fully deployed", "C": "The thrust reverser is stowed", "D": "Thrust reverser system has a fault", "correct": "A"}, {"num": 36, "question": "When does engine anti-ice start operating during takeoff with engine anti-ice selector in", "A": "UTO and icing conditions detected? Engine anti-ice starts operating with airspeed greater than 85 kts.", "B": "Engine anti-ice starts operating with airspeed greater than 75 kts.", "C": "Engine anti-ice is inhibited on ground and thus starts operating when airborne.", "D": "Engine anti-ice already starts operating during taxi.", "correct": "C"}, {"num": 37, "question": "What mode becomes active in climb, when VNAV levels off at a MCP selected altitude, which does not equal the FMC cruise altitude or an active altitude constraint?", "A": "VNAV SPD", "B": "ALT", "C": "VNAV PTH", "D": "VNAV ALT", "correct": "D"}, {"num": 38, "question": "If APU is not available, how many power sources are required for an engine start on ground?", "A": "Main + APU Battery", "B": "1 FWD + 1 AFT external power sources", "C": "2 FWD + 1 AFT external power sources", "D": "2 FWD external power sources", "correct": "D"}, {"num": 39, "question": "How is DC power provided on the B787?", "A": "DC Power is only available from the Main and the APU battery and serves as a backup only", "B": "AC power is converted into DC power by power conversion devices", "C": "The RAT extends whenever DC power is needed", "D": "The Main Engine Generators output is DC Power", "correct": "B"}, {"num": 40, "question": "To talk on the service interphone,", "A": "the service interphone switch has to be selected on and the handset has to be used", "B": "the service interphone switch has to be selected on and the transmitter selector on CAB", "C": "the service interphone switch has to be selected on and the transmitter selector on FLT", "D": "the transmitter selector on FLT. Irrespective of the service interphone switch position.", "correct": "C"}, {"num": 41, "question": "What happens if you open an armed passenger entry door from the outside?", "A": "The pneumatic actuator drives the door open and the slide / raft automatically deploys and inflates", "B": "A pneumatic locking mechanism prevents opening an armed passenger entry door from the outside.", "C": "An electric locking mechanism prevents opening an armed passenger entry door from the outside.", "D": "The mode selector automatically moves to the manual mode and the door opens without slide / raft deployment.", "correct": "D"}, {"num": 42, "question": "How many hydraulic systems do B787 airplanes have?", "A": "3 independent systems, left, center and right", "B": "hydraulics are replaced by electrical motors onboard the B787", "C": "2 main systems and a backup system, powered by a RAT", "D": "3 independent systems, green, blue and yellow", "correct": "A"}, {"num": 43, "question": "The PFC provides tail strike protection", "A": "and does not provide feedback to the control column", "B": "during takeoff only", "C": "during landing only", "D": "during autoland only", "correct": "A"}, {"num": 44, "question": "The brake system is powered by…", "A": "the center hydraulic system.", "B": "the right hydraulic system.", "C": "electric brake actuators.", "D": "the left hydraulic system.", "correct": "C"}, {"num": 45, "question": "How many passenger doors does the B787-9 have and what kind of emergency slides are they equipped with?", "A": "8 Doors, Doors 1,2,4 L+R have dual lane slides, Door 3 L+R have single lane slides", "B": "8 Doors in the main deck, 2 Doors in the upper deck, all have dual lane slides", "C": "6 Doors, 4 dual line slides, 2 single line slides", "D": "8 Doors, Doors 1,2 L+R have dual line slides, the rest are single lane slides", "correct": "A"}, {"num": 46, "question": "What does it mean if the APU FAULT light comes on momentarily during the APU start sequence?", "A": "The AC fuel pump has failed, so the DC fuel pump has taken over automatically.", "B": "One ASG has failed to deliver enough torque to start the APU, so the other one has taken over automatically.", "C": "This is normal during the start sequence.", "D": "The APU has been removed by maintenance personnel.", "correct": "C"}, {"num": 47, "question": "To which minimum quantity may fuel be jettisoned?", "A": "Fuel may be jettisoned to a minimum of 7800kg in the center tank", "B": "Fuel may be jettisoned to a minimum quantity of 3900kg in each main tank", "C": "Fuel may be jettisoned to any quantity at or below MLW", "D": "Fuel may be jettisoned to a minimum quantity of 4500kg in each main tank", "correct": "B"}, {"num": 48, "question": "What happens when a cargo fire is sensed in flight?", "A": "One cargo fire let currentTest = null;
let questions = [];
let current = 0;
let correctQuestions = 0;
let answeredQuestions = 0;
let wrongClicks = 0;
let currentHadWrongAnswer = false;
let locked = false;

function el(id) { return document.getElementById(id); }

function escapeHTML(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function shuffleArray(array) {
  const copy = array.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function buildQuestion(raw) {
  const letters = ['A','B','C','D'];
  return {
    num: raw.num,
    text: raw.question,
    choices: letters.map(letter => ({
      originalLetter: letter,
      displayLetter: letter,
      text: raw[letter],
      isCorrect: raw.correct === letter
    }))
  };
}

function showOnly(id) {
  ['menu','quiz','end'].forEach(section => el(section).classList.toggle('hidden', section !== id));
  window.scrollTo({top:0, behavior:'smooth'});
}

function showMenu() {
  currentTest = null;
  showOnly('menu');
}

function confirmBackToMenu() {
  if (confirm('Quiz verlassen und zum Hauptmenü zurückkehren?')) showMenu();
}

function startTest(testNumber, mixed) {
  currentTest = testNumber;
  const source = TESTS[String(testNumber)] || TESTS[testNumber];
  questions = source.map(buildQuestion);
  if (mixed) questions = shuffleArray(questions);
  current = 0;
  correctQuestions = 0;
  answeredQuestions = 0;
  wrongClicks = 0;
  currentHadWrongAnswer = false;
  locked = false;
  showOnly('quiz');
  render();
}

function formatPercent(value) {
  return value.toLocaleString('de-DE', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' %';
}

function updateStats() {
  const percent = answeredQuestions === 0 ? 0 : (correctQuestions / answeredQuestions) * 100;
  el('scoreText').textContent = `${correctQuestions} / ${answeredQuestions}`;
  el('quoteText').textContent = formatPercent(percent);
  el('quoteText').className = 'quote ' + (percent >= 75 ? 'good' : 'bad');
}

function updateProgress() {
  const percent = (current / questions.length) * 100;
  el('progressBar').style.width = percent + '%';
}

function render() {
  if (current >= questions.length) {
    finish();
    return;
  }
  locked = false;
  currentHadWrongAnswer = false;
  const q = questions[current];
  el('quizTitle').textContent = `Test ${currentTest} – Frage ${current + 1} von ${questions.length}`;
  el('quizSub').textContent = `Frage ${q.num}`;
  el('questionText').textContent = q.text;
  el('feedback').textContent = '';
  el('feedback').className = 'feedback';
  const answerBox = el('answers');
  answerBox.innerHTML = '';
  q.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'answer';
    btn.innerHTML = `<span class="letter">${choice.displayLetter}</span><span>${escapeHTML(choice.text)}</span>`;
    btn.addEventListener('click', () => choose(choice, btn));
    answerBox.appendChild(btn);
  });
  updateStats();
  updateProgress();
}

function choose(choice, button) {
  if (locked || button.disabled) return;
  if (!currentHadWrongAnswer) {
    answeredQuestions++;
  }

  if (choice.isCorrect) {
    locked = true;
    button.classList.add('correct');
    if (!currentHadWrongAnswer) {
      correctQuestions++;
    }
    updateStats();
    el('feedback').textContent = '✅ Richtig!';
    el('feedback').className = 'feedback good';
    [...document.querySelectorAll('.answer')].forEach(b => b.disabled = true);
    setTimeout(() => { current++; render(); }, 1200);
  } else {
    wrongClicks++;
    currentHadWrongAnswer = true;
    button.classList.add('wrong');
    button.disabled = true;
    updateStats();
    el('feedback').textContent = '❌ Falsch! Bitte erneut versuchen.';
    el('feedback').className = 'feedback bad';
  }
}

function resultMessage(percent) {
  if (percent === 100) {
    return { title: 'Perfekter Durchlauf!', icon: '🏆', text: 'Hervorragend – 100%. Das war ein sauberer Flug vom Briefing bis zum Shutdown.' };
  }
  if (percent >= 95) {
    return { title: 'Exzellentes Ergebnis!', icon: '🌟', text: 'Sehr starke Leistung. Da bleibt kaum noch etwas für das Debriefing übrig.' };
  }
  if (percent >= 90) {
    return { title: 'Tolle Leistung!', icon: '🎯', text: 'Sehr souverän. Die Systeme sitzen bereits richtig gut.' };
  }
  if (percent >= 85) {
    return { title: 'Gutes Ergebnis!', icon: '✅', text: 'Nicht schlecht – solide vorbereitet, mit etwas Luft nach oben.' };
  }
  if (percent >= 75) {
    return { title: 'Bestanden!', icon: '👍', text: 'Bestanden. Noch ein paar Wiederholungen, dann wird es deutlich entspannter.' };
  }
  if (percent >= 60) {
    return { title: 'Noch nicht bestanden', icon: '📘', text: 'Da fehlt noch etwas Systemtiefe. Am besten die schwächeren Kapitel gezielt wiederholen.' };
  }
  return { title: 'Noch nicht bestanden', icon: '🛠️', text: 'Das braucht noch Training. Erstmal sortieren, nacharbeiten und dann mit Gegenwind neu ansetzen.' };
}

function finish() {
  updateProgress();
  const finalPercent = questions.length === 0 ? 0 : (correctQuestions / questions.length) * 100;
  const passed = finalPercent >= 75;
  const message = resultMessage(finalPercent);
  el('endTitle').textContent = message.title;
  el('endText').className = passed ? 'resultBox good' : 'resultBox bad';
  el('endText').innerHTML =
    `${message.icon} ${message.text}<br><br>` +
    `Du hast <strong>${correctQuestions} von ${questions.length}</strong> Fragen im ersten Versuch korrekt beantwortet.<br><br>` +
    `<strong>Ergebnis: ${formatPercent(finalPercent)}</strong>`;
  el('restartOriginal').onclick = () => startTest(currentTest, false);
  el('restartMixed').onclick = () => startTest(currentTest, true);
  showOnly('end');
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
